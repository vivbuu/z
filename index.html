<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Змейка P2P</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #1a1a2e;
            font-family: monospace;
            color: white;
            text-align: center;
            touch-action: none;
            user-select: none;
        }
        canvas { border: 2px solid #e94560; border-radius: 8px; background: #16213e; }
        #scores { display: flex; justify-content: center; gap: 40px; margin: 10px 0; }
        .p1 { color: #00ff88; }
        .p2 { color: #ff6b6b; }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #ff6b6b; }
        input {
            padding: 8px;
            border-radius: 6px;
            border: 2px solid #e94560;
            background: #16213e;
            color: white;
            font-size: 14px;
            text-align: center;
        }
        #menu { margin: 15px 0; }
        #status { color: #f0c929; margin: 5px 0; }
        .hidden { display: none; }
        #winner { font-size: 24px; margin-top: 10px; color: #f0c929; }
    </style>
</head>
<body>
    <h2>🐍 P2P ДУЭЛЬ</h2>
    <div id="menu">
        <button onclick="create()">Создать</button>
        <br><br>
        <input id="codeInput" placeholder="Код">
        <button onclick="join()">Войти</button>
    </div>
    <div id="status"></div>
    <div id="gameArea" class="hidden">
        <div id="scores">
            <div class="p1">Ты: <span id="myScore">0</span></div>
            <div class="p2">Враг: <span id="enemyScore">0</span></div>
        </div>
        <canvas id="game"></canvas>
        <div id="winner"></div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const SIZE = 25;
        const W = 30, H = 20;
        canvas.width = W * SIZE;
        canvas.height = H * SIZE;

        const FOOD_COUNT = 5;
        let peer, conn, playerId, gameState, foods, mySnake, enemySnake, myDir, myScore, enemyScore, alive, gameOver, gameLoop;

        const script = document.createElement('script');
        script.src = 'https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js';
        document.head.appendChild(script);

        script.onload = () => {
            peer = new Peer();
            peer.on('open', id => {
                document.getElementById('status').textContent = 'Готов';
            });
            peer.on('connection', c => {
                conn = c;
                setupConnection();
                playerId = 0;
                startGame(0);
            });
        };

        function create() {
            peer.on('open', id => {
                document.getElementById('status').textContent = `Код: ${id}`;
                document.getElementById('codeInput').value = id;
            });
            if (peer.id) {
                document.getElementById('status').textContent = `Код: ${peer.id}`;
                document.getElementById('codeInput').value = peer.id;
            }
        }

        function join() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) return;
            conn = peer.connect(code);
            setupConnection();
            playerId = 1;
        }

        function setupConnection() {
            conn.on('open', () => {
                if (playerId === 1) {
                    document.getElementById('menu').classList.add('hidden');
                    document.getElementById('gameArea').classList.remove('hidden');
                    document.getElementById('status').classList.add('hidden');
                    startGame(1);
                }
            });
            conn.on('data', data => {
                if (data.type === 'start') {
                    document.getElementById('menu').classList.add('hidden');
                    document.getElementById('gameArea').classList.remove('hidden');
                    document.getElementById('status').classList.add('hidden');
                    startGame(playerId);
                }
                if (data.type === 'update') {
                    enemySnake = data.snake;
                    enemyScore = data.score;
                }
                if (data.type === 'foods') {
                    foods = data.foods;
                }
                if (data.type === 'dead') {
                    gameOver = true;
                    clearInterval(gameLoop);
                    document.getElementById('winner').textContent = 'Победа!';
                }
            });
            conn.on('close', () => {
                document.getElementById('status').classList.remove('hidden');
                document.getElementById('status').textContent = 'Отключился';
            });
        }

        function spawnFoods() {
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) {
                let f;
                do {
                    f = { x: Math.floor(Math.random() * W), y: Math.floor(Math.random() * H) };
                } while (mySnake.some(s => s.x === f.x && s.y === f.y) || foods.some(f2 => f2.x === f.x && f2.y === f.y));
                foods.push(f);
            }
        }

        function startGame(id) {
            playerId = id;
            myScore = 0;
            enemyScore = 0;
            gameOver = false;
            alive = true;

            if (playerId === 0) {
                mySnake = [{ x: 5, y: 10 }, { x: 4, y: 10 }, { x: 3, y: 10 }];
                myDir = { x: 1, y: 0 };
                enemySnake = [{ x: 25, y: 10 }, { x: 26, y: 10 }, { x: 27, y: 10 }];
                spawnFoods();
                conn.send({ type: 'start' });
                conn.send({ type: 'foods', foods });
            } else {
                mySnake = [{ x: 25, y: 10 }, { x: 26, y: 10 }, { x: 27, y: 10 }];
                myDir = { x: -1, y: 0 };
                enemySnake = [{ x: 5, y: 10 }, { x: 4, y: 10 }, { x: 3, y: 10 }];
            }

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 120);
        }

        function changeDir(dx, dy) {
            if (!conn || gameOver || !alive) return;
            if (myDir.x + dx === 0 && myDir.y + dy === 0) return;
            myDir = { x: dx, y: dy };
        }

        function update() {
            if (!conn || gameOver || !alive) return;
            if (!foods) return;

            const head = { x: mySnake[0].x + myDir.x, y: mySnake[0].y + myDir.y };

            if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
                die();
                return;
            }
            if (mySnake.some(s => s.x === head.x && s.y === head.y)) {
                die();
                return;
            }
            if (enemySnake && enemySnake.some(s => s.x === head.x && s.y === head.y)) {
                die();
                return;
            }

            mySnake.unshift(head);

            const ate = foods.find(f => f.x === head.x && f.y === head.y);
            if (ate) {
                myScore += 10;
                foods = foods.filter(f => f !== ate);
                let f;
                do {
                    f = { x: Math.floor(Math.random() * W), y: Math.floor(Math.random() * H) };
                } while (mySnake.some(s => s.x === f.x && s.y === f.y) ||
                         (enemySnake && enemySnake.some(s => s.x === f.x && s.y === f.y)) ||
                         foods.some(f2 => f2.x === f.x && f2.y === f.y));
                foods.push(f);
                conn.send({ type: 'foods', foods });
            } else {
                mySnake.pop();
            }

            conn.send({ type: 'update', snake: mySnake, score: myScore });
            draw();
        }

        function die() {
            alive = false;
            gameOver = true;
            clearInterval(gameLoop);
            conn.send({ type: 'dead' });
            document.getElementById('winner').textContent = 'Поражение';
            draw();
        }

        // Клавиатура
        document.addEventListener('keydown', e => {
            const dirs = {
                ArrowUp: [0, -1], ArrowDown: [0, 1],
                ArrowLeft: [-1, 0], ArrowRight: [1, 0],
                w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0]
            };
            if (dirs[e.key]) changeDir(dirs[e.key][0], dirs[e.key][1]);
        });

        // Свайпы
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                changeDir(dx > 0 ? 1 : -1, 0);
            } else {
                changeDir(0, dy > 0 ? 1 : -1);
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (foods) {
                foods.forEach(f => {
                    ctx.fillStyle = '#f0c929';
                    ctx.fillRect(f.x * SIZE + 3, f.y * SIZE + 3, SIZE - 6, SIZE - 6);
                });
            }

            if (mySnake) {
                mySnake.forEach((s, i) => {
                    ctx.fillStyle = i === 0 ? '#00ff88' : `rgba(0,255,136,${0.5 - i * 0.02})`;
                    ctx.fillRect(s.x * SIZE + 1, s.y * SIZE + 1, SIZE - 2, SIZE - 2);
                });
            }

            if (enemySnake) {
                enemySnake.forEach((s, i) => {
                    ctx.fillStyle = i === 0 ? '#ff6b6b' : `rgba(255,107,107,${0.5 - i * 0.02})`;
                    ctx.fillRect(s.x * SIZE + 1, s.y * SIZE + 1, SIZE - 2, SIZE - 2);
                });
            }

            document.getElementById('myScore').textContent = myScore || 0;
            document.getElementById('enemyScore').textContent = enemyScore || 0;

            requestAnimationFrame(draw);
        }

        if (typeof Peer === 'undefined') {
            document.getElementById('status').textContent = 'Загрузка...';
        }
        draw();
    </script>
</body>
</html>
